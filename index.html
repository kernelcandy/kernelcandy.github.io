
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Neon Arcade Snake ⚡</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            font-size: 36px;
            margin-bottom: 5px;
        }
        h2 {
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            margin-top: 5px;
        }
        canvas {
            border: 4px solid #00ffcc;
            background-color: #050508;
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px #00ffcc, inset 0 0 15px rgba(0, 255, 204, 0.3);
            border-radius: 10px;
        }
        /* Neon Security Box styling */
        #captcha-container {
            background-color: #161925;
            border: 3px solid #ff007f;
            border-radius: 12px;
            width: 360px;
            margin: 100px auto;
            padding: 30px;
            box-shadow: 0px 0px 25px #ff007f;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #captcha-container h2 {
            color: #ff007f;
            margin-bottom: 10px;
        }
        p {
            color: #8fa0dd;
            font-size: 14px;
        }
        /* Arcade Input styling */
        .arcade-input {
            background: #050508;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            width: 120px;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        .arcade-btn {
            background: #ff007f;
            border: none;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff007f;
        }
        .arcade-btn:hover {
            background: #ff3399;
        }
        #error-msg {
            color: #ff3333;
            font-weight: bold;
            margin-top: 10px;
            height: 20px;
        }
        #game-container {
            display: none;
        }
    </style>
</head>
<body>

    <!-- 1. CUSTOM NEON SECURITY SCREEN -->
    <div id="captcha-container">
        <h2>⚡ SECURITY CHECK ⚡</h2>
        <p>Solve this arcade code to prove you are human:</p>
        
        <!-- Generates random numbers dynamically -->
        <h3 id="math-question" style="font-size: 28px; color: #00ffcc; margin: 10px 0;"></h3>
        
        <input type="number" id="user-answer" class="arcade-input" placeholder="??">
        <button onclick="checkAnswer()" class="arcade-btn">VERIFY HUMAN</button>
        <div id="error-msg"></div>
    </div>

    <!-- 2. THE GAME VIEW -->
    <div id="game-container">
        <h1>🎮 NEON ARCADE SNAKE 🎮</h1>
        <h2>SCORE: <span id="scoreText">0</span></h2>
        <p>Use your keyboard ARROW KEYS to survive!</p>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        // Generate random math challenge
        let num1 = Math.floor(Math.random() * 10) + 1;
        let num2 = Math.floor(Math.random() * 10) + 1;
        let correctAnswer = num1 + num2;
        
        document.getElementById("math-question").innerText = `${num1} + ${num2} = ?`;

        function checkAnswer() {
            let userAnswer = parseInt(document.getElementById("user-answer").value);
            let errorElement = document.getElementById("error-msg");
            
            if (userAnswer === correctAnswer) {
                errorElement.innerText = "";
                document.getElementById("captcha-container").style.display = "none";
                document.getElementById("game-container").style.display = "block";
                startGame(); 
            } else {
                errorElement.innerText = "❌ ACCESS DENIED. TRY AGAIN.";
                document.getElementById("user-answer").value = "";
                // Give a new problem on failure
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                correctAnswer = num1 + num2;
                document.getElementById("math-question").innerText = `${num1} + ${num2} = ?`;
            }
        }

        // Game Engine Logic
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let count = 0;
        let score = 0;

        let snake = {
            x: 160, y: 160,
            dx: grid, dy: 0,
            cells: [{x: 160, y: 160}],
            maxCells: 4
        };

        let food = { x: 320, y: 320 };

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function resetGame() {
            score = 0;
            document.getElementById("scoreText").innerText = score;
            snake.x = 160; snake.y = 160;
            snake.cells = [{x: 160, y: 160}];
            snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0;
            food.x = getRandomInt(0, 20) * grid;
            food.y = getRandomInt(0, 20) * grid;
        }

        function loop() {
            requestAnimationFrame(loop);

            if (++count < 6) { return; }
            count = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
                alert("⚡ GAME OVER ⚡\nFINAL SCORE: " + score);
                resetGame();
            }

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) { snake.cells.pop(); }

            // Glowing Food
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0055';
            ctx.fillRect(food.x + 1, food.y + 1, grid - 2, grid - 2);

            // Glowing Snake
            ctx.shadowColor = '#00ffcc';
            snake.cells.forEach(function(cell, index) {
                ctx.fillStyle = index === 0 ? '#ffffff' : '#00ffcc';
                ctx.shadowBlur = index === 0 ? 15 : 8;
                ctx.fillRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2);  
                
                if (cell.x === food.x && cell.y === food.y) {
                    snake.maxCells++;
                    score += 10;
                    document.getElementById("scoreText").innerText = score;
                    food.x = getRandomInt(0, 20) * grid;
                    food.y = getRandomInt(0, 20) * grid;
                }
                
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        alert("⚡ GAME OVER ⚡\nFINAL SCORE: " + score);
                        resetGame();
                    }
                }
            });
            
            ctx.shadowBlur = 0;
        }

        document.addEventListener('keydown', function(e) {
            if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        });

        function startGame() {
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
