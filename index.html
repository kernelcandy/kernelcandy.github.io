<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        canvas {
            border: 4px solid white;
            background-color: black;
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <h1>🐍 Classic Snake Game</h1>
    <h2>Score: <span id="scoreText">0</span></h2>
    <p>Use your keyboard arrow keys to move!</p>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let count = 0;
        let score = 0;

        let snake = {
            x: 160,
            y: 160,
            dx: grid,
            dy: 0,
            cells: [{x: 160, y: 160}],
            maxCells: 4
        };

        let food = { x: 320, y: 320 };

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function resetGame() {
            score = 0;
            document.getElementById("scoreText").innerText = score;
            snake.x = 160;
            snake.y = 160;
            snake.cells = [{x: 160, y: 160}];
            snake.maxCells = 4;
            snake.dx = grid;
            snake.dy = 0;
            food.x = getRandomInt(0, 20) * grid;
            food.y = getRandomInt(0, 20) * grid;
        }

        function loop() {
            requestAnimationFrame(loop);

            // This slows down the game loop (6 frames per second)
            if (++count < 6) {
                return;
            }
            count = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snake.x += snake.dx;
            snake.y += snake.dy;

            // Wall collisions (Game Over)
            if (snake.x < 0 || snake.x >= canvas.width || snake.y < 0 || snake.y >= canvas.height) {
                alert("Game Over! Your score: " + score);
                resetGame();
            }

            snake.cells.unshift({x: snake.x, y: snake.y});

            if (snake.cells.length > snake.maxCells) {
                snake.cells.pop();
            }

            // Draw Red Food
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, grid - 1, grid - 1);

            // Draw Green Snake
            ctx.fillStyle = 'green';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);  
                
                // Eat food logic
                if (cell.x === food.x && cell.y === food.y) {
                    snake.maxCells++;
                    score += 10;
                    document.getElementById("scoreText").innerText = score;
                    food.x = getRandomInt(0, 20) * grid;
                    food.y = getRandomInt(0, 20) * grid;
                }
                
                // Self collision check (Game Over)
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        alert("Game Over! Your score: " + score);
                        resetGame();
                    }
                }
            });
        }

        // Keyboard Arrow Key Listeners
        document.addEventListener('keydown', function(e) {
            // Left arrow
            if (e.which === 37 && snake.dx === 0) {
                snake.dx = -grid;
                snake.dy = 0;
            }
            // Up arrow
            else if (e.which === 38 && snake.dy === 0) {
                snake.dy = -grid;
                snake.dx = 0;
            }
            // Right arrow
            else if (e.which === 39 && snake.dx === 0) {
                snake.dx = grid;
                snake.dy = 0;
            }
            // Down arrow
            else if (e.which === 40 && snake.dy === 0) {
                snake.dy = grid;
                snake.dx = 0;
            }
        });

        // Start the game loop
        requestAnimationFrame(loop);
    </script>
</body>
</html>
